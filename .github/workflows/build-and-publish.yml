name: build-and-publish

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read


    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: microsoft

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compute build metadata
        id: vars
        run: |
          SHA=$(git rev-parse --short=7 HEAD)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CLASSIFIER="pr${{ github.event.number }}-$SHA"
          else
            CLASSIFIER="$SHA"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "classifier=$CLASSIFIER" >> "$GITHUB_OUTPUT"

      - name: Test
        env:
          CI: "true"
          GITHUB_REF: ${{ github.ref }}
        run: ./gradlew --no-daemon clean core:test

      - name: Build
        env:
          CI: "true"
          GITHUB_REF: ${{ github.ref }}
        run: ./gradlew --no-daemon assemble :core:shadowJar shadowJar :api:shadowJar generatePomFileForShadowPublication :api:generatePomFileForShadowPublication -PbuildClassifier=${{ steps.vars.outputs.classifier }}

      - name: Publish to Nexus
        if: github.event_name == 'push'
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          CI: "true"
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ -z "$NEXUS_USER" ] || [ -z "$NEXUS_PASSWORD" ]; then
            echo "Skipping publish: Nexus credentials are not configured."
            exit 0
          fi
          ./gradlew --no-daemon publish -PbuildClassifier=${{ steps.vars.outputs.classifier }}

      - name: Prepare artifact bundle
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/libs/INSUtils-*.jar dist/
          cp api/build/libs/INSUtils-api-*.jar dist/
          cp build/publications/shadow/pom-default.xml dist/insutils-plugin.pom
          cp api/build/publications/shadow/pom-default.xml dist/insutils-api.pom
          sha256sum dist/* > dist/SHA256SUMS

      - name: Generate usage instructions
        run: |
          set -euo pipefail

          GROUP="com.inotsleep"
          REPO_URL="https://nexus.inotsleep.com/repository/maven-public/"
          CLASSIFIER="${{ steps.vars.outputs.classifier }}"

          PLUGIN_VERSION=$(grep -oPm1 '(?<=<version>)[^<]+' build/publications/shadow/pom-default.xml)
          API_VERSION=$(grep -oPm1 '(?<=<version>)[^<]+' api/build/publications/shadow/pom-default.xml)

          cat <<EOF | tee -a "$GITHUB_STEP_SUMMARY"
          ## INSUtils build usage

          ### Repository

          **Gradle**
          \`\`\`gradle
          repositories {
              maven { url "$REPO_URL" }
          }
          \`\`\`

          **Maven**
          \`\`\`xml
          <repositories>
            <repository>
              <id>inotsleep-nexus</id>
              <url>$REPO_URL</url>
            </repository>
          </repositories>
          \`\`\`

          ### Plugin Artifact

          Coordinates: \`$GROUP:insutils-plugin:$PLUGIN_VERSION:$CLASSIFIER\`

          **Gradle**
          \`\`\`gradle
          dependencies {
              compileOnly("$GROUP:insutils-plugin:$PLUGIN_VERSION:$CLASSIFIER")
          }
          \`\`\`

          **Maven**
          \`\`\`xml
          <dependency>
            <groupId>$GROUP</groupId>
            <artifactId>insutils-plugin</artifactId>
            <version>$PLUGIN_VERSION</version>
            <classifier>$CLASSIFIER</classifier>
            <scope>provided</scope>
          </dependency>
          \`\`\`

          ### API Artifact

          Coordinates: \`$GROUP:insutils-api:$API_VERSION:$CLASSIFIER\`

          **Gradle**
          \`\`\`gradle
          dependencies {
              compileOnly("$GROUP:insutils-api:$API_VERSION:$CLASSIFIER")
          }
          \`\`\`

          **Maven**
          \`\`\`xml
          <dependency>
            <groupId>$GROUP</groupId>
            <artifactId>insutils-api</artifactId>
            <version>$API_VERSION</version>
            <classifier>$CLASSIFIER</classifier>
            <scope>provided</scope>
          </dependency>
          \`\`\`
          EOF

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: INSUtils-${{ steps.vars.outputs.classifier }}
          path: dist/*
          if-no-files-found: error

